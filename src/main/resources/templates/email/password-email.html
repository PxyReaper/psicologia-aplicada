<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; color: #333;">
    <h2>Bienvenido a Psicología Aplicada</h2>
    <p>Hola <strong th:text="${name}">Nombre</strong>,</p>
    <p>Se ha creado tu cuenta en el sistema. Tus credenciales de acceso son:</p>
    <table style="background: #f5f5f5; padding: 16px; border-radius: 8px; margin: 16px 0;">
        <tr>
            <td><strong>Email:</strong></td>
            <td th:text="${email}">email@example.com</td>
        </tr>
        <tr>
            <td><strong>Contraseña temporal:</strong></td>
            <td><code style="font-size: 1.1em;" th:text="${password}">********</code></td>
        </tr>
    </table>
    <p>Por motivos de seguridad, cambia tu contraseña en el primer inicio de sesión.</p>
    <br>
    <p>Saludos,<br>El equipo de Psicología Aplicada</p>
</body>
</html>
