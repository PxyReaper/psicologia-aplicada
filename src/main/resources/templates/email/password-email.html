<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f4f6f9; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td align="center" style="padding: 40px 16px;">
                <table role="presentation" style="max-width: 520px; width: 100%; border-collapse: collapse; background: #ffffff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);">
                    <tr>
                        <td style="padding: 40px 36px 0 36px; text-align: center;">
                            <div style="width: 64px; height: 64px; background: #1a6b5a; border-radius: 50%; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; font-size: 28px; line-height: 64px; color: #ffffff;">&#x1F9EC;</div>
                            <h1 style="margin: 0; font-size: 22px; line-height: 1.3; color: #1a2a3a; font-weight: 700; letter-spacing: -0.3px;">Bienvenido a<br>Psicología Aplicada</h1>
                            <p style="margin: 8px 0 0 0; font-size: 15px; line-height: 1.5; color: #5a6a7a;">Hola <strong th:text="${name}" style="color: #1a2a3a;">Nombre</strong>,</p>
                            <p style="margin: 8px 0 0 0; font-size: 15px; line-height: 1.5; color: #5a6a7a;">Se ha creado tu cuenta en el sistema. Estas son tus credenciales de acceso:</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 24px 36px;">
                            <table role="presentation" style="width: 100%; border-collapse: collapse; background: #f8fafc; border-radius: 10px; border: 1px solid #e8ecf0;">
                                <tr>
                                    <td style="padding: 20px 24px;">
                                        <table role="presentation" style="width: 100%; border-collapse: collapse;">
                                            <tr>
                                                <td style="padding: 6px 0; font-size: 13px; line-height: 1.5; color: #6a7a8a; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Email</td>
                                            </tr>
                                            <tr>
                                                <td style="padding: 0 0 14px 0; font-size: 16px; line-height: 1.5; color: #1a2a3a; font-weight: 600;" th:text="${email}">email@example.com</td>
                                            </tr>
                                            <tr>
                                                <td style="padding: 6px 0; font-size: 13px; line-height: 1.5; color: #6a7a8a; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Contraseña temporal</td>
                                            </tr>
                                            <tr>
                                                <td style="padding: 0; font-size: 18px; line-height: 1.5; color: #1a6b5a; font-weight: 700; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace; letter-spacing: 0.5px;" th:text="${password}">********</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 0 36px;">
                            <table role="presentation" style="width: 100%; border-collapse: collapse; background: #fef8e7; border-radius: 8px; border: 1px solid #f0e6c8;">
                                <tr>
                                    <td style="padding: 14px 18px; font-size: 13px; line-height: 1.5; color: #7a6a3a;">
                                        <span style="font-weight: 600;">&#x26A0;&#xFE0F;&nbsp; Seguridad:</span> Cambia tu contraseña en el primer inicio de sesión.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 32px 36px 36px 36px; text-align: center; border-top: 1px solid #e8ecf0;">
                            <p style="margin: 0 0 4px 0; font-size: 13px; line-height: 1.5; color: #8a9aaa;">Saludos,</p>
                            <p style="margin: 0; font-size: 14px; line-height: 1.5; color: #1a6b5a; font-weight: 600;">El equipo de Psicología Aplicada</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
