server:
  servlet:
    context-path: /api

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
user:
  secret: ${SECRET_KEY}
  iUsser: ${IUSSER}
domain:
  allowed: ${DOMAIN}

google:
  calendar:
    credentials-path: ${GOOGLE_CALENDAR_CREDENTIALS_PATH}
    calendar-id: ${GOOGLE_CALENDAR_ID}
    application-name: ${GOOGLE_CALENDAR_APPLICATION_NAME}
    calendar-name: ${GOOGLE_CALENDAR_NAME:Psicologia Aplicada}
    base-url: ${GOOGLE_CALENDAR_BASE_URL:https://www.googleapis.com/calendar/v3}
    scope: ${GOOGLE_CALENDAR_SCOPE:https://www.googleapis.com/auth/calendar}
    timezone: ${GOOGLE_CALENDAR_TIMEZONE:Europe/Madrid}
